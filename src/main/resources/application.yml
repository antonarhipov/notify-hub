spring:
  application:
    name: notify-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/notifyhub
    username: notifyhub_app
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

notifyhub:
#  default-channel: email
  rate-limit: 50
  retry:
    max-attempts: 3
    delay-millis: 1000
  audit:
    enabled: false
