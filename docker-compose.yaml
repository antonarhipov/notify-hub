services:
  postgres:
    image: postgres:16-alpine
    container_name: notifyhub-postgres
    environment:
      POSTGRES_DB: notifyhub
      POSTGRES_USER: notifyhub_app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - notifyhub-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyhub_app -d notifyhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: notifyhub-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifyhub
      DB_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    image: nginx:1.27-alpine
    container_name: notifyhub-web
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  notifyhub-data:
